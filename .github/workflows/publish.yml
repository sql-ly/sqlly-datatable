name: Publish sqlly-datatable

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build & publish sqlly-datatable
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GPUI system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-xcb-dev libfontconfig1-dev libfreetype-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/sqlly-datatable -> target

      - name: Format check
        working-directory: crates/sqlly-datatable
        run: cargo fmt --all -- --check

      - name: Clippy (strict on the published library only)
        working-directory: crates/sqlly-datatable
        run: |
          cargo clippy -p sqlly-datatable --all-targets -- -D warnings
          cargo clippy -p sqlly-datatable-sample --all-targets

      - name: Test
        working-directory: crates/sqlly-datatable
        run: cargo test --workspace --all-targets

      - name: Build release tarball
        working-directory: crates/sqlly-datatable
        run: |
          cargo build --release -p sqlly-datatable
          cargo package -p sqlly-datatable --no-verify --allow-dirty

      - name: Publish to crates.io
        working-directory: crates/sqlly-datatable
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CREATE_API_KEY }}
        run: cargo publish -p sqlly-datatable --allow-dirty
