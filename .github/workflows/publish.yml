name: Publish sqlly-datatable

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip upload; only run cargo publish --dry-run'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  publish:
    name: Build & publish sqlly-datatable
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/sqlly-datatable -> target

      - name: Format check
        working-directory: crates/sqlly-datatable
        run: cargo fmt --all -- --check

      - name: Clippy (strict on the published library only)
        working-directory: crates/sqlly-datatable
        run: |
          cargo clippy -p sqlly-datatable --all-targets -- -D warnings
          cargo clippy -p sqlly-datatable-sample --all-targets

      - name: Test
        working-directory: crates/sqlly-datatable
        run: cargo test --workspace --all-targets

      - name: Build release tarball
        working-directory: crates/sqlly-datatable
        run: |
          cargo build --release -p sqlly-datatable
          cargo package -p sqlly-datatable --no-verify --allow-dirty

      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        working-directory: crates/sqlly-datatable
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CREATE_API_KEY }}
        run: cargo publish -p sqlly-datatable --dry-run --allow-dirty

      - name: Publish to crates.io
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: crates/sqlly-datatable
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CREATE_API_KEY }}
        run: |
          cargo publish -p sqlly-datatable --allow-dirty
