name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # `--locked`: CI must test exactly the dependency versions committed in
      # Cargo.lock; bumping them is an explicit `cargo update` in a PR.
      - name: Check formatting
        run: cargo fmt --check
      - name: Compile all targets
        run: cargo check --locked --all-targets
      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Documentation
        run: cargo doc --locked --no-deps
      - name: Unit tests
        run: cargo test --locked --lib
      - name: Integration tests
        run: cargo test --locked --test text_box_gpui

      # Package the crate and upload as a build artifact for auditing.
      # (Possible again since v4.1.0: the workspace moved back from git
      # dependencies — which crates.io rejects — to the registry releases of
      # `gpui` and `gpui-component`.)
      - name: Package
        run: cargo package -p sqlly-datatable
      - name: Upload crate artifact
        uses: actions/upload-artifact@v4
        with:
          name: crate-package
          path: target/package/*.crate
          retention-days: 7

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # --no-verify skips the verification rebuild. The build job already
      # compiled, ran clippy, and passed all tests. This job only packages
      # (fast, no compilation) and uploads to crates.io.
      - name: Publish to crates.io
        run: cargo publish -p sqlly-datatable --no-verify --token ${{ secrets.CRATE_API_KEY }}
